name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      OPEN_METEO_ENABLED: "false"
      FEED_REVALIDATE_SECONDS: "300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run deploy:preflight
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
